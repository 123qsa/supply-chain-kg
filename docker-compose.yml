version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - EXECUTIONS_TIMEOUT=600
      - GENERIC_TIMEZONE=Asia/Shanghai
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=industry_kg
      - POSTGRES_USER=nvidia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MCP_SERVER_URL=http://data-api:8000
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/backup/workflows
    depends_on:
      - neo4j
      - postgres
      - data-api
    restart: unless-stopped

  data-api:
    build:
      context: ./data-api
    ports:
      - "8000:8000"
    environment:
      - OPENBB_PAT=${OPENBB_PAT}
      - KIMI_CLIENT_ID=${KIMI_CLIENT_ID}
      - KIMI_CLIENT_SECRET=${KIMI_CLIENT_SECRET}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=industry_kg
      - POSTGRES_USER=nvidia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
    volumes:
      - ./data-api:/app
    depends_on:
      - neo4j
      - postgres
      - redis
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - ./neo4j/data:/data
      - ./init-scripts/neo4j-init.cypher:/docker-entrypoint-initdb.d/init.cypher
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=industry_kg
      - POSTGRES_USER=nvidia
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    restart: unless-stopped

volumes:
  n8n_data:
